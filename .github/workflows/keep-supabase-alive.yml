name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 午前0時(UTC) = 日本時間 月曜朝9時
  workflow_dispatch:       # GitHubから手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "❌ Supabase ping failed with status $STATUS"
            exit 1
          fi
          echo "✅ Supabase is alive (status: $STATUS)"
